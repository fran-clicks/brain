services:
  - type: web
    name: clicks-brain
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clicks-brain-db
          property: connectionString
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: clicks-brain-db
    plan: free
